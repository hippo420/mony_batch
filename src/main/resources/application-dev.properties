spring.application.name=mony_batch

spring.batch.job.enabled=false

#DataBase Connection Settings

spring.datasource-batch.jdbc-url=jdbc:postgresql://postgres:5432/finadm
spring.datasource-batch.username=metadm
spring.datasource-batch.password=1234
spring.datasource-batch.driver-class-name=org.postgresql.Driver
spring.datasource-batch.hikari.maximum-pool-size=50

spring.datasource-meta.jdbc-url=jdbc:postgresql://postgres:5432/finadm
spring.datasource-meta.username=finadm
spring.datasource-meta.password=1234
spring.datasource-meta.driver-class-name=org.postgresql.Driver
spring.datasource-meta.hikari.maximum-pool-size=50


#JPA Settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
#spring.batch.jdbc.initialize-schema=always
#logging.level.org.hibernate=debug
#logging.level.org.hibernate.type=trace
#spring.jpa.properties.hibernate.dialect.storage_engine=innodb
#spring.jpa.hibernate.naming.physical-strategy = org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

#BatchInsert
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

#Server Config Settings
server.port=31820

##Spring Cloud
# Config
spring.config.import=optional:configserver:http://gaebabja:1234@config-server:20001

#Logging
logging.level.org.springframework.cloud = error
logging.level.org.springframework.boot.context.properties=debug
logging.file.path=/logs/mony_batch
#API_KEY
apikey.openapi.krx.key=${openapi.krx.co.kr.key:DEFAULT_KET_KEY}
apikey.openapi.data.key=${openapi.data.co.kr.key:DEFAULT_DATA_KEY}
apikey.openapi.dart.key=${openapi.dart.co.kr.key:DEFAULT_DART_KEY}
apikey.openapi.news.key=${openapi.news.co.kr.key:DEFAULT_NAVER_NEWS_KEY}
apikey.openapi.news.id=${openapi.news.co.kr.id:DEFAULT_NAVER_NEWS_ID}
apikey.gemini.api.key=${gemini.api.key:DEFAULT_GEMINI_KEY}
apikey.gemini.api.model=${gemini.api.model:gemini-2.0-flash}

minio.endpoint=http://localhost:7005
minio.accessKey=admin
minio.secretKey=12345678
minio.bucket=reports

apikey.ollama.base-url=http://localhost:11434
apikey.ollama.chat.options.model=qwen2.5:14b
apikey.ollama.chat.options.temperature=0.7

apikey.kis.dev.app.key=${kis.dev.app.key:DEFAULT_KET_KEY}
apikey.kis.dev.app.secret=${kis.dev.app.secret:DEFAULT_KET_KEY}

#Redis
spring.data.redis.connect-timeout=1000
spring.data.redis.client-type=LETTUCE
spring.data.redis.repositories.enabled=false
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PWD:1234}

spring.ai.ollama.base-url= http://localhost:11434
spring.ai.ollama.embedding.model= nomic-embed-text
#spring.ai.ollama.embedding.model= mxbai-embed-large
spring.ai.ollama.chat.model= qwen2.5:14b
spring.ai.vector.pgvector.index-type= HNSW
spring.ai.vector.pgvector.distance-type= COSINE_DISTANCE
spring.ai.vector.pgvector.table-name= vector_store
spring.ai.vector.pgvector.dimensions= 768
spring.ai.vector.initialize-schema= true

# Elasticsearch
elasticsearch.host=${ES_HOST:elasticsearch}
elasticsearch.port=${ES_PORT:9200}